services:
    redis:
        image: redis:7-alpine
        restart: unless-stopped
        command:
            [
                "redis-server",
                "--requirepass",
                "${REDIS_PASSWORD}",
                "--appendonly",
                "yes",
            ]
        volumes:
            - redis_data:/data
        networks:
            - backend
        healthcheck:
            # test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
            test: ["CMD", "sh", "-c", "redis-cli -a $$REDIS_PASSWORD ping"]
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 5s
        mem_limit: 256m
        cpus: 0.5

    api:
        image: ${REGISTRY:-local}/api:${SHA:-latest}
        build:
            context: ./api
            dockerfile: Dockerfile
        restart: unless-stopped
        env_file: ./api/.env
        networks:
            - backend
            - frontend
        depends_on:
            redis:
                condition: service_healthy
        healthcheck:
            test:
                [
                    "CMD",
                    "python",
                    "-c",
                    "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')",
                ]
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 10s
        mem_limit: 256m
        cpus: 0.5

    worker:
        image: ${REGISTRY:-local}/worker:${SHA:-latest}
        build:
            context: ./worker
            dockerfile: Dockerfile
        restart: unless-stopped
        env_file: ./worker/.env
        networks:
            - backend
        depends_on:
            redis:
                condition: service_healthy
        healthcheck:
            test: ["CMD", "find", "/tmp/worker_health", "-mmin", "-2"]
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 15s
        mem_limit: 128m
        cpus: 0.5

    frontend:
        image: ${REGISTRY:-local}/frontend:${SHA:-latest}
        build:
            context: ./frontend
            dockerfile: Dockerfile
        restart: unless-stopped
        env_file: ./frontend/.env
        ports:
            - "3000:3000"
        networks:
            - frontend
        depends_on:
            api:
                condition: service_healthy
        healthcheck:
            test:
                [
                    "CMD",
                    "node",
                    "-e",
                    "require('http').get('http://localhost:3000/healthz', (r) => process.exit(r.statusCode === 200 ? 0 : 1))",
                ]
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 10s
        mem_limit: 128m
        cpus: 0.25

volumes:
    redis_data:

networks:
    backend:
    frontend:
