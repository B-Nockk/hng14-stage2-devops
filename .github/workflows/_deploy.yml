name: Deploy

on:
    workflow_call:
        inputs:
            sha:
                required: true
                type: string
            registry:
                required: true
                type: string

jobs:
    deploy:
        name: Deploy
        runs-on: ubuntu-latest
        environment: production
        env:
            DEPLOY_PATH: /home/github-actions-deploy/hng/stage-2

        steps:
            - uses: actions/checkout@v4

            - name: Copy docker-compose.yml to server
              uses: appleboy/scp-action@v1
              with:
                  host: ${{ secrets.DEPLOY_HOST }}
                  username: ${{ secrets.DEPLOY_USER }}
                  key: ${{ secrets.DEPLOY_SSH_KEY }}
                  source: "docker-compose.yml"
                  target: ${{ env.DEPLOY_PATH }}

            - name: Deploy to server
              uses: appleboy/ssh-action@v1
              with:
                  host: ${{ secrets.DEPLOY_HOST }}
                  username: ${{ secrets.DEPLOY_USER }}
                  key: ${{ secrets.DEPLOY_SSH_KEY }}
                  envs: SHA,REGISTRY,DEPLOY_PATH,GHCR_TOKEN,API_ENV,WORKER_ENV,FRONTEND_ENV
                  script: |
                      set -euo pipefail
                      mkdir -p "${DEPLOY_PATH}/api" "${DEPLOY_PATH}/worker" "${DEPLOY_PATH}/frontend"
                      printf "%b" "${API_ENV}"      > "${DEPLOY_PATH}/api/.env"
                      printf "%b" "${WORKER_ENV}"   > "${DEPLOY_PATH}/worker/.env"
                      printf "%b" "${FRONTEND_ENV}" > "${DEPLOY_PATH}/frontend/.env"

                      echo "${GHCR_TOKEN}" | docker login ghcr.io -u b-nockk --password-stdin
                      cd "${DEPLOY_PATH}"

                      SERVICES="api worker frontend"

                      for SERVICE in $SERVICES; do
                        echo "===== Rolling update: ${SERVICE} ====="

                        OLD_ID=$(docker ps -q --filter "name=stage2-${SERVICE}-1")

                        docker pull "${REGISTRY}/${SERVICE}:${SHA}"

                        docker compose up -d --no-deps --scale "${SERVICE}=2" "${SERVICE}" || true

                        NEW_ID=$(docker ps -q --filter "name=stage2-${SERVICE}" \
                          | grep -v "${OLD_ID}" | head -1)

                        DEADLINE=$((SECONDS + 60))
                        HEALTHY=false
                        while [ $SECONDS -lt $DEADLINE ]; do
                          STATE=$(docker inspect --format='{{.State.Health.Status}}' "${NEW_ID}" 2>/dev/null || echo "unknown")
                          echo "  health: ${STATE}"
                          if [ "${STATE}" = "healthy" ]; then
                            HEALTHY=true
                            break
                          fi
                          sleep 3
                        done

                        if [ "${HEALTHY}" = "false" ]; then
                          echo "ERROR: ${SERVICE} failed health check — rolling back."
                          docker stop "${NEW_ID}" && docker rm "${NEW_ID}"
                          docker compose up -d --no-deps --scale "${SERVICE}=1" "${SERVICE}"
                          exit 1
                        fi

                        if [ -n "${OLD_ID}" ]; then
                          docker stop "${OLD_ID}" && docker rm "${OLD_ID}"
                        fi

                        docker compose up -d --no-deps --scale "${SERVICE}=1" "${SERVICE}"
                        echo "${SERVICE} updated successfully."
                      done

                      echo ""
                      echo "✅ All services deployed."
                      docker compose ps
              env:
                  SHA: ${{ inputs.sha }}
                  REGISTRY: ${{ inputs.registry }}
                  DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
                  GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
                  API_ENV: ${{ secrets.API_ENV }}
                  WORKER_ENV: ${{ secrets.WORKER_ENV }}
                  FRONTEND_ENV: ${{ secrets.FRONTEND_ENV }}
