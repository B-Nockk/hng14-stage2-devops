name: Deploy

on:
    workflow_call:
        inputs:
            sha:
                required: true
                type: string
            registry:
                required: true
                type: string

jobs:
    deploy:
        name: Deploy
        runs-on: ubuntu-latest
        environment: production
        env:
            DEPLOY_PATH: /home/github-actions-deploy/hng/stage-2

        steps:
            - uses: actions/checkout@v4

            - name: Copy docker-compose.yml to server
              uses: appleboy/scp-action@v1
              with:
                  host: ${{ secrets.DEPLOY_HOST }}
                  username: ${{ secrets.DEPLOY_USER }}
                  key: ${{ secrets.DEPLOY_SSH_KEY }}
                  source: "docker-compose.yml"
                  target: ${{ env.DEPLOY_PATH }}

            - name: Deploy to server
              uses: appleboy/ssh-action@v1
              with:
                  host: ${{ secrets.DEPLOY_HOST }}
                  username: ${{ secrets.DEPLOY_USER }}
                  key: ${{ secrets.DEPLOY_SSH_KEY }}
                  envs: SHA,REGISTRY,DEPLOY_PATH,GHCR_TOKEN,API_ENV,WORKER_ENV,FRONTEND_ENV,ROOT_ENV
                  script: |
                      set -euo pipefail
                      mkdir -p "${DEPLOY_PATH}/api" "${DEPLOY_PATH}/worker" "${DEPLOY_PATH}/frontend"
                      printf "%b" "${ROOT_ENV}"     > "${DEPLOY_PATH}/.env"
                      printf "%b" "${API_ENV}"      > "${DEPLOY_PATH}/api/.env"
                      printf "%b" "${WORKER_ENV}"   > "${DEPLOY_PATH}/worker/.env"
                      printf "%b" "${FRONTEND_ENV}" > "${DEPLOY_PATH}/frontend/.env"

                      echo "${GHCR_TOKEN}" | docker login ghcr.io -u b-nockk --password-stdin
                      cd "${DEPLOY_PATH}"

                      echo "===== Starting infrastructure: redis ====="
                      docker compose up -d redis

                      SERVICES="api worker frontend"

                      for SERVICE in $SERVICES; do
                          echo "===== Rolling update: ${SERVICE} ====="

                          OLD_ID=$(docker ps -q --filter "name=stage-2-${SERVICE}-1" | head -1)

                          docker pull "${REGISTRY}/${SERVICE}:${SHA}"
                          docker compose up -d --no-deps "${SERVICE}"

                          # wait for the single container to become healthy
                          CONTAINER=$(docker compose ps -q "${SERVICE}" | head -1)
                          DEADLINE=$((SECONDS + 120))
                          HEALTHY=false
                          while [ $SECONDS -lt $DEADLINE ]; do
                              STATE=$(docker inspect --format='{{.State.Health.Status}}' "${CONTAINER}" 2>/dev/null || echo "unknown")
                              echo "  health: ${STATE}"
                              if [ "${STATE}" = "healthy" ]; then
                                  HEALTHY=true
                                  break
                              fi
                              sleep 5
                          done

                          if [ "${HEALTHY}" = "false" ]; then
                              echo "ERROR: ${SERVICE} failed health check — rolling back."
                              docker compose logs "${SERVICE}" --tail=50
                              exit 1
                          fi

                          echo "${SERVICE} updated successfully."
                      done

                      echo ""
                      echo "✅ All services deployed."
                      docker compose ps
              env:
                  SHA: ${{ inputs.sha }}
                  REGISTRY: ${{ inputs.registry }}
                  DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
                  GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
                  API_ENV: ${{ secrets.API_ENV }}
                  WORKER_ENV: ${{ secrets.WORKER_ENV }}
                  FRONTEND_ENV: ${{ secrets.FRONTEND_ENV }}
                  ROOT_ENV: ${{ secrets.ROOT_ENV }}
