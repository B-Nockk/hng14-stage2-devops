name: Build and Scan

on:
    workflow_call:
        inputs:
            registry:
                required: true
                type: string
            sha:
                required: true
                type: string

jobs:
    build-and-scan:
        name: Build and Scan
        runs-on: ubuntu-latest
        permissions:
            security-events: write
        services:
            registry:
                image: registry:2
                ports:
                    - 5000:5000

        steps:
            - uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3
              with:
                  driver-opts: network=host

            - name: Build and push api
              uses: docker/build-push-action@v5
              with:
                  context: ./api
                  push: true
                  tags: |
                      ${{ inputs.registry }}/api:${{ inputs.sha }}
                      ${{ inputs.registry }}/api:latest

            - name: Build and push worker
              uses: docker/build-push-action@v5
              with:
                  context: ./worker
                  push: true
                  tags: |
                      ${{ inputs.registry }}/worker:${{ inputs.sha }}
                      ${{ inputs.registry }}/worker:latest

            - name: Build and push frontend
              uses: docker/build-push-action@v5
              with:
                  context: ./frontend
                  push: true
                  tags: |
                      ${{ inputs.registry }}/frontend:${{ inputs.sha }}
                      ${{ inputs.registry }}/frontend:latest

            - name: Scan api image
              uses: aquasecurity/trivy-action@master
              with:
                  image-ref: ${{ inputs.registry }}/api:${{ inputs.sha }}
                  format: sarif
                  output: trivy-api.sarif
                  severity: CRITICAL
                  exit-code: "1"

            - name: Scan worker image
              uses: aquasecurity/trivy-action@master
              with:
                  image-ref: ${{ inputs.registry }}/worker:${{ inputs.sha }}
                  format: sarif
                  output: trivy-worker.sarif
                  severity: CRITICAL
                  exit-code: "1"

            - name: Scan frontend image
              uses: aquasecurity/trivy-action@master
              with:
                  image-ref: ${{ inputs.registry }}/frontend:${{ inputs.sha }}
                  format: sarif
                  output: trivy-frontend.sarif
                  severity: CRITICAL
                  exit-code: "1"

            - name: Upload SARIF results
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: trivy-sarif
                  path: "*.sarif"
