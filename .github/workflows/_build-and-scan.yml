name: Build and Scan

on:
    workflow_call:
        inputs:
            registry:
                required: true
                type: string
            sha:
                required: true
                type: string

jobs:
    build-and-scan:
        name: Build and Scan
        runs-on: ubuntu-latest
        permissions:
            security-events: write
        services:
            registry:
                image: registry:2
                ports:
                    - 5000:5000

        steps:
            - uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3
              with:
                  driver-opts: network=host

            - name: Build and push api
              uses: docker/build-push-action@v5
              with:
                  context: ./api
                  push: true
                  tags: |
                      ${{ inputs.registry }}/api:${{ inputs.sha }}
                      ${{ inputs.registry }}/api:latest

            - name: Build and push worker
              uses: docker/build-push-action@v5
              with:
                  context: ./worker
                  push: true
                  tags: |
                      ${{ inputs.registry }}/worker:${{ inputs.sha }}
                      ${{ inputs.registry }}/worker:latest

            - name: Build and push frontend
              uses: docker/build-push-action@v5
              with:
                  context: ./frontend
                  push: true
                  tags: |
                      ${{ inputs.registry }}/frontend:${{ inputs.sha }}
                      ${{ inputs.registry }}/frontend:latest

            # ── api ────────────────────────────────────────────────────────
            - name: Scan api image (SARIF report)
              uses: aquasecurity/trivy-action@master
              with:
                  image-ref: ${{ inputs.registry }}/api:${{ inputs.sha }}
                  format: sarif
                  output: trivy-api.sarif
                  exit-code: "0"

            - name: Scan api image (critical gate)
              uses: aquasecurity/trivy-action@master
              with:
                  image-ref: ${{ inputs.registry }}/api:${{ inputs.sha }}
                  format: table
                  severity: CRITICAL
                  exit-code: "1"

            # ── worker ─────────────────────────────────────────────────────
            - name: Scan worker image (SARIF report)
              uses: aquasecurity/trivy-action@master
              with:
                  image-ref: ${{ inputs.registry }}/worker:${{ inputs.sha }}
                  format: sarif
                  output: trivy-worker.sarif
                  exit-code: "0"

            - name: Scan worker image (critical gate)
              uses: aquasecurity/trivy-action@master
              with:
                  image-ref: ${{ inputs.registry }}/worker:${{ inputs.sha }}
                  format: table
                  severity: CRITICAL
                  exit-code: "1"

            # ── frontend ───────────────────────────────────────────────────
            - name: Scan frontend image (SARIF report)
              uses: aquasecurity/trivy-action@master
              with:
                  image-ref: ${{ inputs.registry }}/frontend:${{ inputs.sha }}
                  format: sarif
                  output: trivy-frontend.sarif
                  exit-code: "0"

            - name: Scan frontend image (critical gate)
              uses: aquasecurity/trivy-action@master
              with:
                  image-ref: ${{ inputs.registry }}/frontend:${{ inputs.sha }}
                  format: table
                  severity: CRITICAL
                  exit-code: "1"

            # ── results ────────────────────────────────────────────────────
            - name: Upload SARIF results
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: trivy-sarif
                  path: "*.sarif"

            - name: Display Trivy results
              if: always()
              run: |
                  for f in trivy-api.sarif trivy-worker.sarif trivy-frontend.sarif; do
                    echo "═══════════════════════════════"
                    echo "Results: $f"
                    echo "═══════════════════════════════"
                    if [ -f "$f" ]; then
                      # Extract just the rule descriptions and severity from the SARIF JSON
                      python3 -c "
                  import json, sys
                  data = json.load(open('$f'))
                  for run in data.get('runs', []):
                      for result in run.get('results', []):
                          sev = result.get('properties', {}).get('security-severity', 'N/A')
                          msg = result.get('message', {}).get('text', '')[:120]
                          rule = result.get('ruleId', '')
                          print(f'  [{sev}] {rule}: {msg}')
                  "
                    else
                      echo "  (no file — scan may have been skipped)"
                    fi
                  done
